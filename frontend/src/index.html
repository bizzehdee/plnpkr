<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>plnpkr</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Runtime config (API origin for split deploys); loaded before the app bundle so it's set
       before any code runs. Edit per-deploy without rebuilding — see public/config.js. -->
  <script src="config.js"></script>
  <script>
    // Apply the saved theme before first paint to avoid a flash of the wrong theme. See #40.
    (function () {
      try {
        var pref = localStorage.getItem('pp.theme') || 'system';
        var dark = pref === 'dark' ||
          (pref === 'system' && window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
